# Main application configuration
[general]
app_name = document-search
environment = production
workers = 4
max_connections = 100

[paths]
data_dir = /var/lib/docsearch/data
index_dir = /var/lib/docsearch/index
log_dir = /var/log/docsearch
tmp_dir = /tmp/docsearch

[security]
enable_tls = true
cert_file = /etc/app/ssl/server.crt
key_file = /etc/app/ssl/server.key
