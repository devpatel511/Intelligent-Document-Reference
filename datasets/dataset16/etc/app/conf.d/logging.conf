[loggers]
keys = root,app,db,embedding

[handlers]
keys = console,file,syslog

[formatters]
keys = standard,json

[logger_root]
level = WARNING
handlers = console

[logger_app]
level = INFO
handlers = file
qualname = app

[handler_file]
class = handlers.RotatingFileHandler
args = ('/var/log/docsearch/app.log', 'a', 52428800, 5)
formatter = json
