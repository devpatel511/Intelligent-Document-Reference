upstream docsearch_api {
    server 127.0.0.1:8000;
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name docs.example.com;

    ssl_certificate /etc/app/ssl/server.crt;
    ssl_certificate_key /etc/app/ssl/server.key;

    location /api/ {
        proxy_pass http://docsearch_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /opt/docsearch/ui/dist;
        try_files $uri $uri/ /index.html;
    }
}
