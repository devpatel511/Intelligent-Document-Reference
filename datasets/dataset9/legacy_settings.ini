[DEFAULT]
debug = false
log_level = WARNING

[database]
host = localhost
port = 3306
name = legacy_docs
user = app_user
charset = utf8mb4

[search]
engine = elasticsearch
index_name = documents
refresh_interval = 30s
max_results = 100

[cache]
backend = memcached
servers = cache1:11211,cache2:11211
timeout = 300
key_prefix = doc_

[email]
smtp_host = smtp.internal
smtp_port = 587
from_addr = noreply@example.com
use_tls = true
