# Default RAG Benchmark Configuration
# ~100 prompts across 6 categories exercising datasets 0-17

benchmark:
  name: "RAG Pipeline Benchmark v1"
  version: "1.0.0"
  dataset_path: "datasets/"
  runs_per_query: 3
  top_k: 5

prompts:
  # ======================================================================
  # CATEGORY 1: FILE RETRIEVAL  (~25 prompts)
  # Query that expects a specific file to be retrieved at rank 1.
  # ======================================================================

  # --- text files ---
  - id: fr-001
    type: file_retrieval
    query: "What does the project glossary say about BM25 and HNSW?"
    category: file_retrieval
    file_type: text
    folder_size: small
    expected_file: "datasets/dataset0/glossary.txt"

  - id: fr-002
    type: file_retrieval
    query: "Show me the meeting notes from Project Alpha"
    category: file_retrieval
    file_type: text
    folder_size: small
    expected_file: "datasets/dataset0/meeting_notes.txt"

  - id: fr-003
    type: file_retrieval
    query: "What are the Flask requirements and dependencies for the search application?"
    category: file_retrieval
    file_type: text
    folder_size: small
    expected_file: "datasets/dataset1/requirements.txt"

  - id: fr-004
    type: file_retrieval
    query: "Find the catalog of literary works in the collection"
    category: file_retrieval
    file_type: text
    folder_size: medium
    expected_file: "datasets/dataset8/catalog.txt"

  - id: fr-005
    type: file_retrieval
    query: "Show me the adventures of Sherlock Holmes text"
    category: file_retrieval
    file_type: text
    folder_size: medium
    expected_file: "datasets/dataset8/adventures_of_sherlock_holmes.txt"

  # --- code files ---
  - id: fr-006
    type: file_retrieval
    query: "Where is the BM25 search engine implementation with hybrid vector retrieval?"
    category: file_retrieval
    file_type: code
    folder_size: small
    expected_file: "datasets/dataset1/search_engine.py"

  - id: fr-007
    type: file_retrieval
    query: "Find the Flask application with search API endpoints"
    category: file_retrieval
    file_type: code
    folder_size: small
    expected_file: "datasets/dataset1/app.py"

  - id: fr-008
    type: file_retrieval
    query: "Show me the text chunking utility with overlap support"
    category: file_retrieval
    file_type: code
    folder_size: small
    expected_file: "datasets/dataset1/utils.py"

  - id: fr-009
    type: file_retrieval
    query: "Where is the Dockerfile for Python 3.12 with gunicorn?"
    category: file_retrieval
    file_type: code
    folder_size: small
    expected_file: "datasets/dataset1/Dockerfile"

  - id: fr-010
    type: file_retrieval
    query: "Find the Docusaurus configuration file with navigation setup"
    category: file_retrieval
    file_type: code
    folder_size: large
    expected_file: "datasets/dataset14/docusaurus.config.js"

  # --- config files ---
